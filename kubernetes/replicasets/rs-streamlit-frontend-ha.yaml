apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-frontend-ha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-ha
  template:
    metadata:
      labels:
        app: frontend-ha
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - user
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: frontend-ha
              topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: datatomas/uppercut_analytics:front-end
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
