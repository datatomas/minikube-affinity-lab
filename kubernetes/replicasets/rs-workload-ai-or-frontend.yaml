apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-workload-in-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prober-workload-in-ai
  template:
    metadata:
      labels:
        app: prober-workload-in-ai
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: In
                    values:
                      - ai
                      - frontend
      containers:
        - name: http-prober
          image: datatomas/uppercut_analytics:http-prober
          imagePullPolicy: Always
          livenessProbe:
            exec:
              command: ["sh", "-c", "python -c 'print(\"ok\")'"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 10
