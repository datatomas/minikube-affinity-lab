apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-gpu-in-nvidia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prober-gpu-in-nvidia
  template:
    metadata:
      labels:
        app: prober-gpu-in-nvidia
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: gpu
                    operator: In
                    values:
                      - nvidia
      containers:
        - name: http-prober
          image: datatomas/uppercut_analytics:http-prober
          imagePullPolicy: Always
          livenessProbe:
            exec:
              command: ["sh", "-c", "python -c 'print(\"ok\")'"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 10
